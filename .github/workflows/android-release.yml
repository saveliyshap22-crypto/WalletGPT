name: Build Android release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: contains(github.event.head_commit.message, '[release v0.1.0]')
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build installable beta APK
        run: gradle --no-daemon --stacktrace assembleDebug

      - name: Prepare release file
        run: cp app/build/outputs/apk/debug/app-debug.apk WalletGPT-v0.1.0.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: WalletGPT-v0.1.0
          path: WalletGPT-v0.1.0.apk

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create v0.1.0 WalletGPT-v0.1.0.apk --title "WalletGPT 0.1.0 beta" --notes-file RELEASE_NOTES.md --target "$GITHUB_SHA"
